<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Kotomka{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', path='favicon.svg') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', path='favicon-32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', path='favicon-16.png') }}">
    <link rel="icon" href="{{ url_for('static', path='favicon.ico') }}" sizes="any">
    <link rel="apple-touch-icon" href="{{ url_for('static', path='apple-touch-icon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='app.css') }}">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">Kotomka</a>
      <nav class="topnav">
        <a href="{{ url_for('jobs_index') }}">Jobs</a>
        <a href="/">New job</a>
      </nav>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
  </body>
</html>
